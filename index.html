<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Rencontre Amoureuse !</title>

<style>
* { box-sizing: border-box; }

body {
 margin: 0;
 font-family: 'Segoe UI', sans-serif;
 background: linear-gradient(135deg, #ff416c, #ff4b2b);
 color: white;
}

/* NAV */
nav {
 display: flex;
 justify-content: space-around;
 padding: 12px;
 background: rgba(0,0,0,0.3);
 backdrop-filter: blur(10px);
 position: sticky;
 top: 0;
}

nav button {
 background: white;
 color: #ff416c;
 border: none;
 border-radius: 25px;
 padding: 10px 15px;
 font-weight: bold;
}

/* PAGES */
.page {
 display: none;
 padding: 15px;
 animation: fade 0.3s ease;
}

.active { display: block; }

@keyframes fade {
 from { opacity: 0; transform: translateY(10px); }
 to { opacity: 1; transform: translateY(0); }
}

/* AUTH */
.auth-box {
 background: white;
 color: black;
 padding: 20px;
 border-radius: 20px;
 max-width: 350px;
 margin: auto;
 margin-top: 40px;
 text-align: center;
}

.auth-box input {
 width: 100%;
 padding: 10px;
 margin: 5px 0;
 border-radius: 10px;
 border: 1px solid #ddd;
}

.auth-box button {
 width: 100%;
 background: linear-gradient(45deg,#ff416c,#ff4b2b);
 color: white;
 margin-top: 10px;
}

/* SWIPE */
#swipeContainer {
 position: relative;
 height: 420px;
}

.card {
 position: absolute;
 width: 100%;
 height: 100%;
 border-radius: 20px;
 overflow: hidden;
 box-shadow: 0 15px 30px rgba(0,0,0,0.3);
 background: black;
}

.card img {
 width: 100%;
 height: 100%;
 object-fit: cover;
}

.card h3 {
 position: absolute;
 bottom: 20px;
 left: 20px;
}

/* CHAT */
#chatBox {
 height: 300px;
 overflow-y: auto;
 background: rgba(255,255,255,0.2);
 border-radius: 15px;
 padding: 10px;
}

.msg {
 padding: 10px;
 border-radius: 15px;
 margin: 5px;
 max-width: 70%;
}

.me { background: #dcf8c6; color:black; margin-left:auto; }
.other { background: white; color:black; }

/* INPUT */
.input-row {
 display: flex;
 gap: 5px;
 margin-top: 10px;
}

.input-row input {
 flex: 1;
 padding: 10px;
 border-radius: 20px;
 border: none;
}

/* CONVERSATIONS */
.conv-item {
 background: white;
 color: black;
 padding: 10px;
 border-radius: 15px;
 margin-bottom: 5px;
 display: flex;
 justify-content: space-between;
}

/* BADGE */
.badge {
 background: red;
 border-radius: 50%;
 padding: 5px 8px;
 font-size: 12px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
 <button onclick="showPage('authPage')">👤</button>
 <button onclick="loadSwipe()">🔥</button>
 <button onclick="loadConversations()">💬 <span id="notifBadge" class="badge">0</span></button>
 <button onclick="goPremium()">💎</button>
 <button onclick="showPage('profilePage')">👤👤 Profil</button>
<button onclick="loadLikes()">❤️ Likes</button>
 
</nav>

<!-- AUTH -->
<div id="authPage" class="page active">
 <div class="auth-box">
  <h2>🔥 Rencontre Amoureuse !</h2>

  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Mot de passe">
  <button onclick="login()">Connexion</button>

  <hr>

  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer un compte</button>
 </div>
</div>

<!-- SWIPE -->
<div id="profiles" class="page">
 <div id="swipeContainer"></div>
 <div style="background:white;color:black;padding:10px;border-radius:15px;margin-bottom:10px;">
 <input id="minAge" placeholder="Âge min">
 <input id="maxAge" placeholder="Âge max">
 <input id="cityFilter" placeholder="Ville">
</div>
</div>

<!-- CHAT -->
<div id="chatPage" class="page">
 <h3>💬 Chat</h3>
 <div id="chatBox"></div>

 <div class="input-row">
  <input id="msg" placeholder="Message...">
  <button onclick="sendMessage()">➤</button>
  <button onclick="startRecording()">🎤</button>
 </div>
</div>

<!-- CONVERSATIONS -->
<div id="conv" class="page">
 <h3>💬 Conversations</h3>
 <div id="convList"></div>
</div>

<!-- BIO IA -->
<div id="bioPage" class="page">
 <h3>🧠 Bio IA</h3>
 <textarea id="bio" style="width:100%;border-radius:10px;"></textarea>
 <button onclick="generateBio()">Générer</button>
</div>


<!-- mon profil -->
<div id="profilePage" class="page">
 <h3>👤 Mon profil</h3>

 <input id="prenom" placeholder="Prénom">
 <input id="age" type="number" placeholder="Âge">
 <input id="ville" placeholder="Ville">

 <textarea id="bio" placeholder="Ta bio..."></textarea>

 <input id="interests" placeholder="Centres d’intérêt (sport, musique...)">

 <select id="lookingFor">
  <option value="">Je cherche...</option>
  <option value="amour">❤️ Amour</option>
  <option value="amitié">😊 Amitié</option>
  <option value="fun">🔥 Fun</option>
 </select>

 <input type="file" id="photoInput" multiple>
<button onclick="improveProfile()">🧠 Améliorer mon profil</button>
 <button onclick="saveProfile()">💾 Sauvegarder</button>
</div>

<!-- qui ma like  -->
<div id="likesPage" class="page">
 <h3>❤️ Qui t’a liké</h3>
 <div id="likesList"></div>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
const supabaseClient = supabase.createClient(
 "https://YOUR_PROJECT.supabase.co",
 "YOUR_PUBLIC_KEY"
);
</script>

<!-- AUTH -->
<script>
function showPage(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

async function login(){
 const { error } = await supabaseClient.auth.signInWithPassword({
  email: logEmail.value,
  password: logPass.value
 });
 if(error) return alert(error.message);
 loadSwipe();
}

async function register(){
 const { error } = await supabaseClient.auth.signUp({
  email: regEmail.value,
  password: regPass.value
 });
 if(error) return alert(error.message);
 alert("Compte créé !");
}
</script>

<script src="script.js"></script>

</body>
</html>
