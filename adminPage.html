<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <!-- Modules -->
  <script src="js/auth.js" defer></script>
  <script src="js/header-loader.js" defer></script>
  <script src="js/app.js" defer></script>
  <script src="js/profile-clean.js" defer></script>
<nav class="header">
  <a href="index.html">🏠 Accueil</a>
  <a href="profile.html">👤 Profil</a>
  <a href="pageDesProfils.html">🔍 Recherche</a>
  <a href="premiumPage.html">💎 Premium</a>
  <a href="signup.html">👤 Inscription</a>

  <span id="userInfo"></span>
</nav>
<center>
    <button id="authBtn">Connexion</button>
    <button id="adminPage">Admin</button>
</center>
  <style>
    body {
      visibility: hidden;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- TITLE -->
  <div style="text-align:center;padding:40px">
    <h1 style="font-size:40px">💘 Rencontre Amoureuse</h1>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div class="container">

    <h1>👑 Admin Dashboard</h1>

    <h2>👥 Utilisateurs</h2>
    <div id="usersList"></div>

    <h2>🚨 Signalements</h2>
    <div id="reportsList"></div>

    <h2>📊 Stats</h2>
    <div id="stats"></div>

  </div>

  <!-- AUTH CHECK -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { data, error } = await supabaseClient.auth.getUser();

        if (error || !data?.user) {
          window.location.href = "index.html";
          return;
        }

        // afficher la page seulement si connecté
        document.body.style.visibility = "visible";

      } catch (e) {
        console.error(e);
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
