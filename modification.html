<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Page</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- JS -->
<!-- 1. Supabase AVANT -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2. config -->
<script src="js/config.js"></script>

<!-- 3. tes scripts -->
<script src="js/auth.js" defer></script>
<script src="js/app.js" defer></script>
<script src="js/profile-clean.js" defer></script>
</head>

<body>
<!-- NAV -->
<nav>
  <ul>
    <li><a href="index.html">Accueil</a></li>
    <li><a href="profile.html">Mon profil</a></li>
    <li><a href="pageDesProfils.html">Recherche</a></li>
    <li><a href="premiumPage.html">Premium</a></li>
  </ul>

  <button id="authBtn" onclick="goToAuth()">Se connecter</button>
  <button id="logoutBtn" onclick="logout()" style="display:none;">Se déconnecter</button>
</nav>

<hr>
<div class="profile-container">

  <!-- VIEW MODE -->
  <div id="profileView" class="profile-card">

    <img id="viewPhoto" class="profile-photo">

    <h2 id="viewName"></h2>
    <p id="viewAgeVille"></p>

    <p id="viewBio" class="bio"></p>
    <p id="viewLooking"></p>

    <button onclick="enableEdit()">✏️ Modifier</button>

  </div>

  <!-- EDIT MODE -->
  <div id="profileEdit" class="profile-card" style="display:none;">

    <h3>Modifier mon profil</h3>

    <input id="prenom" placeholder="Prénom">
    <input id="nom" placeholder="Nom">
    <input id="age" type="number" placeholder="Âge">
    <input id="ville" placeholder="Ville">

    <textarea id="bio" placeholder="Ta bio..."></textarea>

    <select id="lookingFor">
      <option value="">Je cherche...</option>
      <option value="amour">❤️ Amour</option>
      <option value="amitié">😊 Amitié</option>
      <option value="fun">🔥 Fun</option>
    </select>

    <input type="file" id="photoInput">
    <img id="preview">

    <button onclick="saveProfile()">💾 Enregistrer</button>
    <button onclick="cancelEdit()">❌ Annuler</button>

  </div>

</div>
