<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Création profil</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/core/config.js"></script>

  <!-- JS -->
<script type="module" src="js/profile/init.js"></script>

<nav class="header">
  <a href="index.html">🏠 Accueil</a>
  <a href="profile.html">👤 Profil</a>
  <a href="pageDesProfils.html">🔍 Recherche</a>
  <a href="premiumPage.html">💎 Premium</a>
  <a href="signup.html">👤 Inscription</a>

  <span id="userInfo"></span>
</nav>
 <button id="authBtn">Connexion</button>
 <center>
    <a href= "adminPage.html">👤 Admin</a>
    </center>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <hr>

  <!-- PAGE PROFIL -->
  <div id="profilePage" class="page">

    <div class="box">

      <h1 style="font-size:40px">💘 Rencontre Amoureuse</h1>
      <hr><br>

      <h3>👤 Mon profil</h3>

      <p>
        👉 Crée ton profil pour commencer<br>
        👉 Plus ton profil est complet, meilleurs sont les matchs 💘<br>
        👉 Tu peux modifier ton profil à tout moment<br>
      </p>

      <hr><br>

      <!-- CREATE PROFILE -->
      <div id="profileCreate">

        <img id="createPhoto"
             src="https://picsum.photos/120"
             style="width:120px;height:120px;border-radius:50%;margin-bottom:15px;">

        <br>

        <input id="prenom" placeholder="Prénom"><br>
        <input id="nom" placeholder="Nom"><br>
        <input id="age" type="number" placeholder="Âge"><br>
        <input id="ville" placeholder="Ville"><br>

        <textarea id="bio" placeholder="Bio"></textarea><br>

        <select id="lookingFor">
          <option value="">Je cherche...</option>
          <option value="amour">❤️ Amour</option>
          <option value="amitié">😊 Amitié</option>
          <option value="fun">🔥 Fun</option>
        </select>

        <br><br>

        <input type="file" id="photoInput"><br><br>

        <button onclick="saveProfile()">💾 Enregistrer mon profil</button>

      </div>

      <!-- VIEW PROFILE -->
      <div id="profileView" style="display:none">

        <img id="viewPhoto"
             style="width:120px;height:120px;border-radius:50%;margin-bottom:20px;">

        <h2 id="viewName"></h2>
        <p id="viewAgeVille"></p>
        <p id="viewBio"></p>
        <p id="viewLooking"></p>

      </div>

    </div>
  </div>

  <!-- INIT -->
  <script>
    window.addEventListener("DOMContentLoaded", async () => {

      try {
        const { data, error } = await supabaseClient.auth.getUser();

        if (error || !data?.user) {
          window.location.href = "login.html";
          return;
        }

        // load functions if exist
        if (typeof loadProfile === "function") await loadProfile();
        if (typeof loadMyProfiles === "function") await loadMyProfiles();
        if (typeof initAuthUI === "function") initAuthUI();


      document.body.style.visibility = "visible";

      } catch (e) {
        console.error("INIT ERROR:", e);
        window.location.href = "login.html";
      }

    });
    
  </script>

</body>
</html>
