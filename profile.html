<div class="box">

  <div style="text-align:center;padding:40px">
    <h1 style="font-size:40px">💘 Rencontre Amoureuse !</h1>
    <hr><br>

    <h3>👤 Mon profil</h3>
    <hr><br>

    <p>
      👉 Complète ton profil pour avoir plus de matchs 💘<br>
      💡 Plus tu ajoutes d’infos, plus l’IA te propose de bons profils
    </p>
  </div>

  <!-- 🔵 CREATION -->
 <div id="profileCreate" style="text-align:center;">
    <img id="createPhoto" style="width:120px;border-radius:50%; display:block;margin:auto;margin-bottom:20px;">
    <input id="prenom" placeholder="Prénom"><br>
    <input id="nom" placeholder="Nom"><br>
    <input id="age" type="number" placeholder="Âge"><br>
    <input id="ville" placeholder="Ville"><br>
    <textarea id="bio" placeholder="Bio"></textarea><br>
    <input id="photo" type="file"><br>
    <select id="lookingFor">
      <option value="">Je cherche...</option>
      <option value="amour">❤️ Amour</option>
      <option value="amitié">😊 Amitié</option>
      <option value="fun">🔥 Fun</option>
    </select><br><br>

    <button onclick="saveProfile()">💾 Créer mon profil</button>
  </div>

  <!-- 🟢 VIEW -->
  <div id="profileView" style="text-align:center;" >
    <img id="viewPhoto" style="width:120px;border-radius:50%; display:block;margin:auto;margin-bottom:20px">
    <h2 id="viewName"></h2>
    <p id="viewAgeVille"></p>
    <p id="viewBio"></p>
    <p id="viewLooking"></p>

    <button onclick="enableEdit()">✏️ Modifier mon profil</button>
     <br>
      <button onclick="deleteProfile()">🗑️ Supprimer mon profil</button >
          <br>
        <br> 
  </div>

  <!-- 🟡 EDIT -->
 <div id="profileEdit" style="display:none; text-align:center;">
    <input id="edit_prenom" placeholder="prenom"><br>
    <input id="edit_nom" placeholder="Nom"><br>
    <input id="edit_age" type="number" placeholder="Age"><br>
    <input id="edit_ville" placeholder="Ville"><br>
    <textarea id="edit_bio" placeholder="Bio"></textarea><br>
    <select id="edit_lookingFor">
       <option value="">Je cherche...</option>
      <option value="amour">❤️ Amour</option>
      <option value="amitié">😊 Amitié</option>
      <option value="fun">🔥 Fun</option>
    </select><br><br>

    <button onclick="updateProfile()">💾 Sauvegarder</button>
  </div>

</div>

</body>
<script>
document.addEventListener("DOMContentLoaded", async () => {

  const { data } = await supabaseClient.auth.getUser();

  if(!data.user){
    window.location.href = "index.html";
    return;
  }

  // 🔥 UNE SEULE fonction
  loadMyProfile();

});

  document.body.style.visibility = "visible";
</script>
