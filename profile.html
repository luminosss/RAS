<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Création profil</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/core/config.js"></script>

  <script src="js/core/session.js" defer></script>
  <script src="js/auth.js"></script>
  <script type="module" src="js/ui/search-ui.js"></script>

  <style>
    body {
      visibility: hidden;
      margin: 0;
    }

    .profile-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 90vh;
      padding: 20px;
    }

    .profile-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      width: 95%;
      max-width: 520px;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    input, textarea, select {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .progress {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      margin: 10px 0;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4d6d, #ffb703);
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="header">
  <div class="nav-left">
    <a href="index.html">🏠 Accueil</a>
    <a href="profile.html">👤 Profil</a>
    <a href="pageDesProfils.html">🔍 Recherche</a>
    <a href="premiumPage.html">💎 Premium</a>
    <a href="signup.html">👤 Inscription</a>
  </div>

  <div class="box">
    <div class="nav-right">
      <button id="authBtn">Connexion</button>
      <span class="online-dot"></span>
    </div>
    <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
  </div>
</nav>

<div class="profile-wrapper">
  <div class="profile-card">

    <h1>💘 Mon profil</h1>

    <div class="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <img id="createPhoto" src="https://picsum.photos/120" class="avatar">
    <input type="file" onchange="previewPhoto(event)">

    <input id="prenom" placeholder="Prénom" oninput="handleInput()">
    <input id="nom" placeholder="Nom" oninput="handleInput()">
    <input id="age" type="number" placeholder="Âge" oninput="handleInput()">
    <input id="ville" placeholder="Ville" oninput="handleInput()">

    <textarea id="bio" placeholder="Bio" oninput="handleInput()"></textarea>

    <select id="lookingFor" onchange="handleInput()">
      <option value="">Je cherche...</option>
      <option value="amour">❤️ Amour</option>
      <option value="amitié">😊 Amitié</option>
      <option value="fun">🔥 Fun</option>
    </select>

    <button onclick="manualSaveProfile()">💾 Sauvegarder</button>

  </div>
</div>

<hr>

<h3>👀 Aperçu</h3>

<div id="previewCard">
  <img id="previewPhoto" src="https://picsum.photos/120">
  <h3 id="previewName">Prénom Nom</h3>
  <p id="previewInfo">Âge • Ville</p>
  <p id="previewBio">Bio...</p>
  <p id="previewLooking">💘 Recherche...</p>
</div>

<script>
let saveTimeout = null;
let isSaving = false;
let lastProfile = "";

/* INPUT GLOBAL */
function handleInput() {
  updatePreview();
  updateProgress();
  triggerAutoSave();
}

/* SAVE MANUEL */
async function manualSaveProfile() {
  const { data } = await supabaseClient.auth.getUser();
  if (!data?.user) return;

  const user = data.user;
  const ageValue = parseInt(document.getElementById("age").value);

  const profile = {
    user_id: user.id,
    prenom: prenom.value || "",
    nom: nom.value || "",
    age: isNaN(ageValue) ? null : Math.min(Math.max(ageValue, 18), 100),
    ville: ville.value || "",
    bio: bio.value || "",
    looking_for: lookingFor.value || "",
    photo: createPhoto.src
  };

  const { error } = await supabaseClient
    .from("profiles")
    .upsert(profile, { onConflict: "user_id" });

  if (error) return alert("❌ Erreur");
  alert("✔ Sauvegardé");
}

/* AUTO SAVE */
function triggerAutoSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(autoSaveProfile, 800);
}

async function autoSaveProfile() {
  if (isSaving) return;

  try {
    isSaving = true;

    const { data } = await supabaseClient.auth.getUser();
    if (!data?.user) return;

    const user = data.user;
    const ageValue = parseInt(age.value);

    const profile = {
      user_id: user.id,
      prenom: prenom.value || "",
      nom: nom.value || "",
      age: isNaN(ageValue) ? null : ageValue,
      ville: ville.value || "",
      bio: bio.value || "",
      looking_for: lookingFor.value || "",
      photo: createPhoto.src
    };

    const current = JSON.stringify(profile);
    if (current === lastProfile) return;
    lastProfile = current;

    await supabaseClient
      .from("profiles")
      .upsert(profile, { onConflict: "user_id" });

  } finally {
    isSaving = false;
  }
}

/* PHOTO */
function previewPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    createPhoto.src = e.target.result;
    handleInput();
  };
  reader.readAsDataURL(file);
}

/* PROGRESS */
function updateProgress() {
  const fields = [prenom, nom, age, ville, bio, lookingFor];
  const filled = fields.filter(f => f.value.trim() !== "").length;
  progressBar.style.width = (filled / fields.length * 100) + "%";
}

/* PREVIEW */
function updatePreview() {
  previewName.textContent = `${prenom.value || "Prénom"} ${nom.value || "Nom"}`;
  previewInfo.textContent = `${age.value || "?"} ans • ${ville.value || "Ville"}`;
  previewBio.textContent = bio.value || "Bio...";
  previewLooking.textContent = lookingFor.value ? "💘 " + lookingFor.value : "💘 Recherche...";
  previewPhoto.src = createPhoto.src;
}

/* LOAD */
window.addEventListener("DOMContentLoaded", async () => {

  const { data } = await supabaseClient.auth.getUser();
  if (!data?.user) return location.href = "login.html";

  const user = data.user;

  const { data: profile } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("user_id", user.id)
    .maybeSingle();

  if (profile) {
    prenom.value = profile.prenom || "";
    nom.value = profile.nom || "";
    age.value = profile.age || "";
    ville.value = profile.ville || "";
    bio.value = profile.bio || "";
    lookingFor.value = profile.looking_for || "";
    createPhoto.src = profile.photo || createPhoto.src;
  }

  updatePreview();
  updateProgress();
  document.body.style.visibility = "visible";
});
</script>

</body>
</html>
