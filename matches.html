<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mes Matchs</title>

  <link rel="stylesheet" href="css/style.css">

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script type="module" src="js/ui/search-ui.js"></script>

  <style>
    body { visibility: hidden; }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="header">

  <div class="nav-left">
    <a href="index.html">🏠 Accueil</a>
    <a href="profile.html">👤 Profil</a>
    <a href="pageDesProfils.html">🔍 Recherche</a>
    <a href="matches.html">💘 Matchs</a>
    <a href="premiumPage.html">💎 Premium</a>
  </div>

  <div class="nav-right">
  <span class="online-dot"></span>
    <button id="authBtn">Connexion</button>
  </div>

</nav>

<!-- ADMIN LINK -->
<div class="admin-link" style="text-align:center; margin-top:10px;">
   <!-- ADMIN (caché par défaut) -->
    <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
</div>

<!-- MAIN -->
<main>

  <h1 style="text-align:center;">💘 Tes Matchs</h1>

  <p style="text-align:center; opacity:0.8;">
    Voici les personnes avec qui tu as matché 🔥
  </p>

  <!-- MATCH GRID -->
  <div id="matchesGrid" class="grid"></div>

  <!-- ACTION GLOBAL -->
  <div style="text-align:center; margin-top:30px;">

    <button onclick="openRandomChat()" style="font-size:16px;">
      💬 Discuter avec un match
    </button>

  </div>

</main>

<!-- INIT SAFE -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  document.body.style.visibility = "visible";
});
async function openRandomChat() {
  const grid = document.getElementById("matchesGrid");

  if (!grid || grid.children.length === 0) {
    alert("Aucun match disponible 😢");
    return;
  }

  // récupère un match au hasard
  const cards = grid.children;
  const random = cards[Math.floor(Math.random() * cards.length)];

  const userId = random?.dataset?.userid;

  if (!userId) {
    alert("Erreur utilisateur");
    return;
  }

  window.location.href = `chat.html?user=${userId}`;
}

</script>

</body>
</html>
