<body>

  <!-- HEADER -->

  <!-- PREMIUM PAGE -->
  <div id="premiumPage" class="page">

    <div class="container">

      <h1 style="font-size:40px">💘 Rencontre Amoureuse</h1>
      <hr>

      <div class="box">

        <h2>💎 Passe Premium</h2>

        <p>
          🔥 Multiplie tes matchs par 3<br><br>

          ✔ 7 jours d’essai gratuit<br>
          ✔ Likes illimités<br>
          ✔ Voir qui t’a liké ❤️<br>
          ✔ Chat illimité 💬<br>

        <a href="paypal.html">
          <button onclick="buyPremium()">Devenir Premium</button>
        </a>

      </div>

    </div>

  </div>

  <!-- AUTH CHECK -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { data, error } = await supabaseClient.auth.getUser();

        if (error || !data?.user) {
          window.location.href = "index.html";
          return;
        }

        document.body.style.visibility = "visible";

      } catch (e) {
        console.error(e);
        window.location.href = "index.html";
      }
    });
  </script>

</body>
