<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Premium</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/config.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* NAV PROPRE CENTRÉE */
.header{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:55px;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

.nav-inner{
  width:100%;
  max-width:900px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
}

.nav-left a,
.nav-right a{
  color:white;
  text-decoration:none;
  margin-right:10px;
  font-size:14px;
}

/* CENTRAGE */
.container{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:60px;
}

/* CARD */
.card{
  width:90%;
  max-width:360px;
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:22px;
  text-align:center;
  backdrop-filter: blur(12px);
}

.price{
  font-size:28px;
  color:#ffb703;
  margin:10px 0;
}

ul{
  list-style:none;
  padding:0;
  text-align:left;
}

li{
  padding:6px 0;
  font-size:14px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(90deg,#ff4d6d,#ffb703);
  color:white;
  font-size:16px;
  margin-top:10px;
}

.status{
  font-size:13px;
  margin-top:10px;
  opacity:0.8;
}
</style>
</head>

<body>

<!-- NAV (CORRECTEMENT DANS BODY) -->
<div class="header">

  <div class="nav-inner">

    <div class="nav-left">
      <a href="index.html">🏠 Accueil</a>
      <a href="profile.html">👤 Profil</a>
      <a href="pageDesProfils.html">🔍 Recherche</a>
      <a href="signup.html">🧾 Inscription</a>
    </div>

    <div class="nav-right">
      <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
      <a href="premiumPage.html">💎 Premium</a>
    </div>

  </div>

</div>

<!-- CENTRAGE -->
<div class="container">

  <div class="card">

    <h1>💎 Premium</h1>

    <div class="price">10€ / mois</div>

    <ul>
      <li>🔥 Profil boosté</li>
      <li>💬 Messages illimités</li>
    </ul>

    <button onclick="buyPremium()">Activer</button>

    <div class="status" id="status"></div>

  </div>

</div>

<script>
async function buyPremium(){
  const status = document.getElementById("status");

  const { data } = await supabaseClient.auth.getUser();

  if(!data?.user){
    status.textContent = "❌ Non connecté";
    return;
  }

  const { error } = await supabaseClient
    .from("profiles")
    .update({ premium:true })
    .eq("user_id", data.user.id);

  if(error){
    status.textContent = "❌ Erreur";
    return;
  }

  status.textContent = "✔ Premium activé 💎";
}
</script>

</body>
</html>
