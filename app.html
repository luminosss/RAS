<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Rencontre Amoureuse</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <!-- JS -->
  <script src="js/app.js" defer></script>
  <script src="js/profile-clean.js" defer></script>

<nav class="header">
  <a href="index.html">🏠 Accueil</a>
  <a href="profile.html">👤 Profil</a>
  <a href="pageDesProfils.html">🔍 Recherche</a>
  <a href="premiumPage.html">💎 Premium</a>
  <a href="signup.html">👤 Inscription</a>

  <span id="userInfo"></span>
</nav>
 <button id="authBtn">Connexion</button>
 <center>
    <a href= "adminPage.html">👤 Admin</a>
    </center>
<body>

  <!-- HEADER -->
  <div id="header"></div>

  <!-- PROFILES -->
  <div id="profiles"></div>
  <div id="profilesGrid"></div>

  <hr>

  <!-- TITLE -->
  <div style="text-align:center;padding:40px">
    <h1 style="font-size:40px">💘 Rencontre Amoureuse</h1>
  </div>

  <hr>

  <!-- CHAT -->
  <h2 style="text-align:center">💬 Chat</h2>

  <div id="chatBox"></div>

  <!-- PREMIUM BANNER -->
  <div id="premiumBanner">
    💎 Passe Premium pour débloquer toutes les fonctionnalités
    <button onclick="buyPremium()">Devenir Premium</button>
  </div>

  <!-- CHAT INTERFACE -->
  <div id="chatInterface" style="display:none">
    <div id="typingIndicator"></div>

    <div class="inputBox">
      <input id="msgInput" placeholder="Message...">
      <button onclick="sendMessage()">Envoyer</button>
    </div>
  </div>

  <!-- NON PREMIUM VIEW -->
  <div id="notPremium" style="display:none">
    <h3>💎 Passe Premium pour discuter</h3>
    <button onclick="buyPremium()">Devenir Premium</button>
  </div>

  <!-- AUTH CHECK -->
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { data, error } = await supabaseClient.auth.getUser();

        if (error || !data?.user) {
          window.location.href = "index.html";
          return;
        }

        document.body.style.visibility = "visible";

      } catch (e) {
        console.error(e);
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
