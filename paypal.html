<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Abonnement Premium</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>

  <script src="js/auth.js" defer></script>

  <style>
    body {
      visibility: hidden;
      margin: 0;
    }

    .premium-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      min-height: 80vh;
      text-align: center;
      gap: 15px;
      padding: 20px;
    }

    .premium-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
    }

    #paypal-button-container {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="header">

  <div class="nav-left">
    <a href="index.html">🏠 Accueil</a>
    <a href="profile.html">👤 Profil</a>
    <a href="pageDesProfils.html">🔍 Recherche</a>
    <a href="premiumPage.html">💎 Premium</a>
    <a href="signup.html">👤 Inscription</a>
  </div>

  <div class="nav-right">
      <span class="online-dot"></span>
    <button id="authBtn">Connexion</button>
  </div>

</nav>

<!-- ADMIN -->
<div style="text-align:center; margin-top:10px;">
    <!-- ADMIN (caché par défaut) -->
    <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
</div>

<!-- MAIN -->
<main class="premium-container">

  <h1>💘 Rencontre Amoureuse</h1>

  <div class="premium-card">

    <h2>💎 Passe Premium</h2>

    <p>
      Débloque toutes les fonctionnalités :
      <br><br>
      💬 Chat illimité<br>
      ❤️ Voir qui t'a liké<br>
      ⚡ Boost visibilité<br>
      🔥 Matchs illimités
    </p>

    <!-- PAYPAL -->
    <div id="paypal-button-container"></div>

  </div>

</main>

<!-- PAYPAL -->
<script src="https://www.paypal.com/sdk/js?client-id=BAAcwRkEgBGh_RD4Xm5UkO7ZzRHO-nd-3uOJM_2lDV3EbNzCUaO9iFSNQ6NNAtZkZEJ5l7NEiPILhwYJFE&components=hosted-buttons&disable-funding=venmo&currency=EUR"></script>

<script>
paypal.Buttons({
  style: {
    shape: 'pill',
    color: 'gold',
    layout: 'vertical',
    label: 'subscribe'
  },

  createSubscription: function (data, actions) {
    return actions.subscription.create({
      plan_id: 'P-35P930338C9428627NHQYFBI'
    });
  },

  onApprove: async function (data) {
    alert("💎 Premium activé !");

    console.log("Subscription:", data.subscriptionID);
  }
}).render('#paypal-button-container');
</script>

<!-- AUTH SAFE -->
<script>
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const { data, error } = await supabaseClient.auth.getUser();

    if (error || !data?.user) {
      window.location.href = "login.html";
      return;
    }

    document.body.style.visibility = "visible";

  } catch (e) {
    console.error(e);
    window.location.href = "login.html";
  }
});
</script>

</body>
</html>
