<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/core/config.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  width:320px;
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#ff4d6d,#ffb703);
  color:white;
  cursor:pointer;
}
</style>
</head>
<!-- NAV -->
<nav class="header">
  <div class="nav-left">
    <a href="index.html">🏠 Accueil</a>
    <a href="profile.html">👤 Profil</a>
    <a href="pageDesProfils.html">🔍 Recherche</a>
    <a href="premiumPage.html">💎 Premium</a>
    <a href="signup.html">👤 Inscription</a>
  </div>

  <div class="box">
    <div class="nav-right">
      <button id="authBtn">Connexion</button>
      <span class="online-dot"></span>
    </div>
    <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
  </div>
</nav>

<body>

<div class="box">

<h2>🔐 Nouveau mot de passe</h2>

<input type="password" id="newPassword" placeholder="Nouveau mot de passe">
<button onclick="updatePassword()">Changer</button>

<script>
async function updatePassword() {
  const password = document.getElementById("newPassword").value;

  const { error } = await supabaseClient.auth.updateUser({
    password
  });

  if (error) {
    alert("❌ " + error.message);
    return;
  }

  alert("✔ Mot de passe mis à jour !");
  window.location.href = "login.html";
}
</script>

</body>
</html>
