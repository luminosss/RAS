 <div class="box">

<!-- MAIN -->
<main class="container">

  <h1>💘 Recherche de profils</h1>

  <h3>🔥 Trouve ton match parfait</h3>

  <!-- FILTERS -->
  <div class="filters">
    <select id="searchAge">
      <option value="">Âge</option>
      <option value="20-25">20-25</option>
      <option value="25-35">25-35</option>
