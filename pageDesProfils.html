
   
    
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche profils</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/core/config.js"></script>

  <script src="js/auth.js" defer></script>
  <script type="module" src="js/ui/search-ui.js"></script>

  <style>
    body {
      visibility: hidden;
      margin: 0;
    }

    .container {
      padding: 20px;
    }

    #profilesGrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 10px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: rgb(231, 102, 102);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav class="header">
  <div class="nav-left">
    <a href="index.html">🏠 Accueil</a>
    <a href="profile.html">👤 Profil</a>
    <a href="pageDesProfils.html">🔍 Recherche</a>
    <a href="premiumPage.html">💎 Premium</a>
    <a href="signup.html">👤 Inscription</a>
  </div>

  <div class="box">
    <div class="nav-right">
      <button id="authBtn">Connexion</button>
      <span class="online-dot"></span>
    </div>
    <a id="adminLink" href="adminPage.html" style="display:none;">👤 Admin</a>
  </div>
</nav>

<!-- MAIN -->
<main class="container">

  <h1>💘 Recherche de profils</h1>
  <h3>🔥 Trouve ton match parfait</h3>

  <div class="filters">
    <select id="searchAge">
      <option value="">Âge</option>
      <option value="20-25">20-25</option>
      <option value="25-35">25-35</option>
      <option value="35-50">35-50</option>
    </select>

    <button id="searchBtn">🔍 Rechercher</button>
  </div>

  <div id="profilesGrid"></div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal">
  <div class="modal-content">

    <img id="viewPhoto" width="150" style="border-radius:10px;">
    <h2 id="viewName"></h2>
    <p id="viewInfo"></p>
    <p id="viewBio"></p>
<span class="online-dot"></span>
    <button class="btn-chat" onclick="startChat()">💬 Chat</button>
    <button id="likeBtn" class="btn-like" onclick="toggleLike()">❤️ Like</button>
    <button onclick="closeModal()">❌ Close</button>

  </div>
</div>

<!-- MATCH MODAL -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <h1>💥 MATCH !</h1>
    <p>Vous vous êtes likés ❤️</p>
     <button onclick="closeMatch()" style="
      margin-top:15px;
      padding:10px;
      border:none;
      border-radius:10px;
      cursor:pointer;
    ">
      Fermer
    </button>
  </div>
</div>

<script>
/* ================= STATE ================= */
const state = {
  user: null,
  isPremium: false,
  selected: null,
  likes: new Set()
};

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded", async () => {
  const { data } = await supabaseClient.auth.getUser();

  if (!data?.user) {
    window.location.href = "login.html";
    return;
  }

  state.user = data.user;

  await loadPremium();
  await loadLikes();

  initMatchRealtime(); // 👈 APRÈS user OK

  document.body.style.visibility = "visible";
});

let matchShown = false;
let matchChannel = null;


function initMatchRealtime() {

  if (matchChannel) return; // 🔥 empêche double init

  matchChannel = supabaseClient
    .channel("matches")
    .on(
      "postgres_changes",
      {
        event: "INSERT",
        schema: "public",
        table: "matches"
      },
      (payload) => {
        const match = payload.new;

        if (!state.user) return;

        if (
          match.user1 === state.user.id ||
          match.user2 === state.user.id
        ) {
          showMatchModal();
        }
      }
    )
    .subscribe();
}

/* ================= PREMIUM ================= */
async function loadPremium() {
  const { data } = await supabaseClient
    .from("profiles")
    .select("is_premium")
    .eq("user_id", state.user.id)
    .maybeSingle();

  state.isPremium = data?.is_premium || false;
}

/* ================= LIKES ================= */
async function loadLikes() {
  const { data } = await supabaseClient
    .from("likes")
    .select("liked_id")
    .eq("liker_id", state.user.id);

  state.likes = new Set(data?.map(l => l.liked_id) || []);
}

/* ================= SEARCH ================= */
document.getElementById("searchBtn").onclick = loadProfiles;

async function loadProfiles() {
  const { data } = await supabaseClient
    .from("profiles")
    .select("*")
    .neq("user_id", state.user.id);

  render(data || []);
}

/* ================= RENDER ================= */
function render(list) {
  const grid = document.getElementById("profilesGrid");
  grid.innerHTML = "";

  list.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.photo || 'https://picsum.photos/200'}">
      <h3>${p.prenom}</h3>
      <p>${p.age} ans • ${p.ville}</p>
    `;

    div.onclick = () => openProfile(p);
    grid.appendChild(div);
  });
}

/* ================= PROFILE ================= */
function openProfile(p) {
  state.selected = p;

  document.getElementById("profileModal").style.display = "flex";

  document.getElementById("viewPhoto").src = p.photo;
  document.getElementById("viewName").textContent = p.prenom;
  document.getElementById("viewInfo").textContent = `${p.age} ans • ${p.ville}`;
  document.getElementById("viewBio").textContent = p.bio;

  updateLikeBtn();
}

function closeModal() {
  document.getElementById("profileModal").style.display = "none";
}

/* ================= LIKE ================= */
async function toggleLike() {
  const user = state.user.id;
  const target = state.selected.user_id;

  if (state.likes.has(target)) {
    await supabaseClient
      .from("likes")
      .delete()
      .eq("liker_id", user)
      .eq("liked_id", target);

    state.likes.delete(target);
    updateLikeBtn();
    return;
  }

  await supabaseClient.from("likes").insert({
    liker_id: user,
    liked_id: target
  });

  state.likes.add(target);

  await checkMatch(user, target);
  updateLikeBtn();
}

/* ================= MATCH ================= */
async function checkMatch(a, b) {

  const { data } = await supabaseClient
    .from("likes")
    .select("*")
    .eq("liker_id", b)
    .eq("liked_id", a)
    .maybeSingle();

  if (!data) return;

  const user1 = a < b ? a : b;
  const user2 = a < b ? b : a;

  // 🔥 check si match existe déjà
  const { data: existing } = await supabaseClient
    .from("matches")
    .select("*")
    .eq("user1", user1)
    .eq("user2", user2)
    .maybeSingle();

  if (existing) return;

  await supabaseClient.from("matches").insert({
    user1,
    user2
  });

  // 🔥 important : éviter re-display au refresh
  if (matchShown) return;

  matchShown = true;
  showMatchModal();
}

function closeMatch() {
  document.getElementById("matchModal").style.display = "none";
}

function showMatch() {
  const modal = document.getElementById("matchModal");
  modal.style.display = "flex";

  setTimeout(() => {
    modal.style.opacity = "0";
    setTimeout(() => {
      modal.style.display = "none";
      modal.style.opacity = "1";
    }, 300);
  }, 2000);
}
function showMatchModal() {
  const modal = document.getElementById("matchModal");

  modal.style.display = "flex";

  setTimeout(() => {
    modal.style.display = "none";
  }, 2000);
}
function closeModal() {
  document.getElementById("profileModal").style.display = "none";
  matchShown = false; // 🔥 reset important
}
/* ================= CHAT ================= */
function startChat() {
  if (!state.selected) return;

  if (!state.isPremium) {
    alert("💎 Premium requis");
    return;
  }

  window.location.href =
    "chat.html?user=" + state.selected.user_id;
}

/* ================= UI ================= */
function updateLikeBtn() {
  const btn = document.getElementById("likeBtn");

  const liked = state.likes.has(state.selected.user_id);

  btn.textContent = liked ? "💔 Unlike" : "❤️ Like";
}
</script>

</body>
</html>
