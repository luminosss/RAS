<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="favicon.ico">

  <!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/core/config.js" defer></script>

<script type="module" src="js/ui/auth-ui.js"></script>


</head>

<body>

<nav class="header">
  <a href="index.html">🏠 Accueil</a>
  <a href="profile.html">👤 Profil</a>
  <a href="pageDesProfils.html">🔍 Recherche</a>
  <a href="premiumPage.html">💎 Premium</a>
  <a href="signup.html">👤 Inscription</a>

  <span id="userInfo"></span>
</nav>
 <center>
    <a href= "adminPage.html">👤 Admin</a>
    </center>

  <main>
    <div class="card">
      <h2>Connexion</h2>

      <input type="email" id="email" placeholder="Email">

      <div class="password-field">
        <input type="password" id="password" placeholder="Mot de passe">
        <button type="button" id="toggleBtn" onclick="togglePassword()">Afficher</button>
      </div>

      <button onclick="login()">Se connecter</button>

      <p style="margin-top:15px;">
        Mot de passe oublié ?
      </p>

      <input id="resetPassword" type="email" placeholder="Ton email">
      <button onclick="resetPassword()">Envoyer lien</button>

      <p id="errorMsg"></p>

      <p style="margin-top:20px;">
        Pas de compte ?
        <a href="signup.html">Inscription</a>
      </p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.body.style.visibility = "visible";
    });

    function togglePassword() {
      const input = document.getElementById("password");
      const btn = document.getElementById("toggleBtn");

      if (input.type === "password") {
        input.type = "text";
        btn.textContent = "Cacher";
      } else {
        input.type = "password";
        btn.textContent = "Afficher";
      }
    }
  </script>

</body>
</html>
